id: deep_research
description: 选择该流程处理需要多维度、多次检索或综合判断的研究请求，例如全面分析、比较、尽调、竞争壁垒、技术实力、可信度或风险评估；研究目标或边界不足时也选择它，由流程先确认长期目标和完成标准。
input_schema:
  type: object
  required: [request]
  properties:
    request:
      type: string
      minLength: 1
    subject:
      type: string
    question:
      type: string
  additionalProperties: false
start_node: confirm_scope
nodes:
  - id: confirm_scope
    execution: autonomous
    goal: 将用户请求澄清为一个可确认的研究 Intent；明确 goal、desired_outcome、2 到 4 条可验证 success_criteria、约束、非目标、假设和 candidate_dimensions。每个维度必须直接支撑用户判断，声明对应 criterion_id、研究问题、实体完整名称及别名、单一 dimension、verification_method 和必要 depends_on；比较任务保留 Tesla Model Y、小米 YU7 等完整车型短语，不得把 Model Y 缩成普通 token。输入足够时直接通过 complete_node 提交 Intent 草案，Harness 会负责唯一一次人工确认；不要再调用 request_user_input。只有缺少会实质改变长期目标或任务图的信息时才询问用户。
    inputs:
      request:
        $ref: "#/workflow/input"
    completion:
      review: required
      output_schema:
        type: object
        required:
          - intent_id
          - version
          - status
          - goal
          - desired_outcome
          - success_criteria
          - constraints
          - non_goals
          - assumptions
          - planning_context
        properties:
          intent_id:
            type: string
            minLength: 1
          version:
            const: 1
          status:
            const: draft
          goal:
            type: string
            minLength: 1
          desired_outcome:
            type: string
            minLength: 1
          success_criteria:
            type: array
            minItems: 2
            maxItems: 4
            items:
              type: object
              required: [id, description, required, verification_mode, validator_id]
              properties:
                id:
                  type: string
                  minLength: 1
                description:
                  type: string
                  minLength: 1
                required:
                  const: true
                verification_mode:
                  const: evidence
                validator_id:
                  const: research-criterion-verifier
              additionalProperties: false
          constraints:
            type: array
            items:
              type: string
          non_goals:
            type: array
            items:
              type: string
          assumptions:
            type: array
            items:
              type: string
          planning_context:
            type: object
            required: [subject, research_question, candidate_dimensions]
            properties:
              subject:
                type: string
                minLength: 1
              research_question:
                type: string
                minLength: 1
              decision_context:
                type: string
              candidate_dimensions:
                type: array
                minItems: 2
                maxItems: 4
                items:
                  type: object
                  required:
                    - id
                    - title
                    - criterion_id
                    - question
                    - entities
                    - dimension
                    - verification_method
                    - depends_on
                  properties:
                    id:
                      type: string
                      minLength: 1
                    title:
                      type: string
                      minLength: 1
                      maxLength: 200
                    criterion_id:
                      type: string
                      minLength: 1
                    question:
                      type: string
                      minLength: 1
                    entities:
                      type: array
                      minItems: 1
                      maxItems: 2
                      items:
                        type: object
                        required: [name, aliases]
                        properties:
                          name:
                            type: string
                            minLength: 1
                          aliases:
                            type: array
                            maxItems: 6
                            items:
                              type: string
                        additionalProperties: false
                    dimension:
                      type: string
                      minLength: 1
                    verification_method:
                      type: string
                      enum:
                        - single_source_sufficient
                        - dual_independent_required
                        - official_primary_required
                        - contradiction_sensitive
                        - unverifiable_flag
                    depends_on:
                      type: array
                      items:
                        type: string
                additionalProperties: false
            additionalProperties: false
        additionalProperties: false
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: investigate
      failed: $fail

  - id: investigate
    execution: task_graph
    inputs:
      intent:
        $ref: "#/nodes/confirm_scope/output"
    planner: research-planner
    graph_policy: research-graph-policy
    context_builder: research-context-builder
    task_validators: [research-task-verifier]
    group_validators: []
    criterion_validators: [research-criterion-verifier]
    goal_verifier: research-goal-verifier
    operation_adapters: []
    parent_inline_components: []
    human_task_contracts: []
    child_templates: [research-dimension]
    limits:
      max_tasks: 6
      max_graph_depth: 4
      max_replans: 2
      max_concurrency: 4
      max_child_runs: 8
      template_concurrency_limits:
        research-dimension: 4
    completion:
      output_schema_id: research-task-graph-result-v1
      validator: research-task-graph-result
      require: [goal_verified, committed_results]
    transitions:
      completed: synthesize_report
      waiting: $wait
      failed: $fail

  - id: synthesize_report
    execution: autonomous
    goal: 只依据 Parent Runtime 已接受的 committed_results 综合回答用户；先直接给出跨维度结论和关键取舍，再列出真正影响判断的限制。不得添加 committed Finding 中不存在的事实、URL 或证据，不得复制 key_findings、citations、provenance 或 evidence；这些字段由后续确定性 Operation 从已提交结果组装。
    inputs:
      intent:
        $ref: "#/nodes/confirm_scope/output"
      committed_results:
        $ref: "#/nodes/investigate/output/committed_results"
    completion:
      output_schema:
        type: object
        required: [direct_answer, limitations]
        properties:
          direct_answer:
            type: string
            minLength: 1
          limitations:
            type: array
            items:
              type: string
        additionalProperties: false
    capabilities:
      tools: []
    limits:
      max_steps: 4
    transitions:
      completed: finalize_report
      failed: $fail

  - id: finalize_report
    execution: operation
    operation: build_evidence_graph
    inputs:
      report:
        $ref: "#/nodes/synthesize_report/output"
      committed_results:
        $ref: "#/nodes/investigate/output/committed_results"
    transitions:
      completed: $complete
      failed: $fail
