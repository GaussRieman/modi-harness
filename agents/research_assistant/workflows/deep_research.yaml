id: deep_research
description: 选择该流程处理需要多维度、多次检索或综合判断的研究请求，例如全面分析、比较、尽调、竞争壁垒、技术实力、可信度或风险评估；研究目标或边界不足时也选择它，由流程先向用户确认范围。
input_schema:
  type: object
  required: [request]
  properties:
    request:
      type: string
      minLength: 1
    subject:
      type: string
    question:
      type: string
  additionalProperties: false
start_node: confirm_scope
nodes:
  - id: confirm_scope
    execution: autonomous
    goal: 理解用户真正想判断或决定什么，形成明确研究目标，并拆成 2 到 4 个依赖有序、互不重叠、能够直接回答用户问题的研究问题；问题应聚焦决策所需证据，不要为了显得全面而机械加入产业规模、政策、高校或背景介绍；输入足够时直接通过 complete_node 提交范围草案，Harness 会负责展示并让用户确认，绝对不要再调用 request_user_input 请求确认；只有缺少会实质改变研究方向的事实时才询问用户
    inputs:
      request:
        $ref: "#/workflow/input"
    completion:
      review: required
      output_schema:
        type: object
        required: [subject, research_question, task_plan]
        properties:
          subject:
            type: string
            minLength: 1
          research_question:
            type: string
            minLength: 1
          decision_context:
            type: string
          constraints:
            type: array
            items:
              type: string
          task_plan:
            type: object
            required: [items]
            properties:
              items:
                type: array
                minItems: 2
                maxItems: 4
                items:
                  type: object
                  required: [id, title]
                  properties:
                    id:
                      type: string
                      minLength: 1
                    title:
                      type: string
                      minLength: 1
                      maxLength: 200
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: investigate
      failed: $fail

  - id: investigate
    execution: autonomous
    goal: 按已确认 TaskPlan 中尚未解决的问题逐项研究；开始每一项前先自行判断合适的 verification_method（single_source_sufficient / dual_independent_required / official_primary_required / contradiction_sensitive / unverifiable_flag）；判定为 unverifiable_flag 的问题直接调用 record_research_finding 记录 blocked，不得搜索；其余问题必须按照 get_current_time → public_web_search → verify_claim_evidence → record_research_finding 的顺序执行。每次搜索前都重新调用 get_current_time，并把刚返回的 time_token 原样传给紧随其后的搜索。依据 query-planning Skill 将每个实体拆成独立 structured search item，声明 entity、aliases、dimension 和精确 query，不得把比较双方塞进同一条长查询。首轮搜索后对该 task 当前全部 search_id 和全部 usable URL 逐条验证，包括 unrelated；若需补搜，先重新取时，补搜后必须重新验证首轮与补搜的完整来源集合。最终 Finding 只传最新 verification_id，不要重复抄写 evidence，Runtime 会自动绑定该验证输出；证据不足或标注被拒绝时按提示修正，不得跳过验证直接 blocked。全部问题关闭后只需通过 complete_node 提交 direct_answer 和总体 limitations
    inputs:
      scope:
        $ref: "#/nodes/confirm_scope/output"
    completion:
      output_schema:
        type: object
        required: [direct_answer, limitations]
        properties:
          direct_answer:
            type: string
            minLength: 1
          limitations:
            type: array
            items:
              type: string
    capabilities:
      tools: [get_current_time, public_web_search, verify_claim_evidence, record_research_finding]
    limits:
      max_steps: 40
    transitions:
      completed: finalize_report
      failed: $fail

  - id: finalize_report
    execution: operation
    operation: build_evidence_graph
    inputs:
      report:
        $ref: "#/nodes/investigate/output"
    transitions:
      completed: $complete
      failed: $fail
