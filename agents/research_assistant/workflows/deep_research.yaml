id: deep_research
description: 选择该流程处理需要多维度、多次检索或综合判断的研究请求，例如全面分析、比较、尽调、竞争壁垒、技术实力、可信度或风险评估；研究目标或边界不足时也选择它，由流程先向用户确认范围。
input_schema:
  type: object
  required: [request]
  properties:
    request:
      type: string
      minLength: 1
    subject:
      type: string
    question:
      type: string
  additionalProperties: false
start_node: confirm_scope
nodes:
  - id: confirm_scope
    execution: autonomous
    goal: 理解用户真正想判断或决定什么，形成明确研究目标，并拆成 2 到 4 个依赖有序、互不重叠、能够直接回答用户问题的研究问题；问题应聚焦决策所需证据，不要为了显得全面而机械加入产业规模、政策、高校或背景介绍；输入足够时直接通过 complete_node 提交范围草案，Harness 会负责展示并让用户确认，绝对不要再调用 request_user_input 请求确认；只有缺少会实质改变研究方向的事实时才询问用户
    inputs:
      request:
        $ref: "#/workflow/input"
    completion:
      review: required
      output_schema:
        type: object
        required: [subject, research_question, task_plan]
        properties:
          subject:
            type: string
            minLength: 1
          research_question:
            type: string
            minLength: 1
          task_plan:
            type: object
            required: [items]
            properties:
              items:
                type: array
                minItems: 2
                maxItems: 4
                items:
                  type: object
                  required: [id, title]
                  properties:
                    id:
                      type: string
                      minLength: 1
                    title:
                      type: string
                      minLength: 1
                      maxLength: 200
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: investigate
      failed: $fail

  - id: investigate
    execution: autonomous
    goal: 按已确认 TaskPlan 中尚未解决的问题逐项研究；为当前问题生成 1 到 2 个互补且不重复的查询，通过一次 public_web_search 并行检索；搜索本身不解决问题，证据足够时调用 record_research_finding，记录直接结论、对用户的意义、关键证据、来源类型、时间口径、置信度和限制后关闭问题；证据不足时以 blocked 记录缺口并请求用户帮助，不得继续调用搜索或直接 request_user_input；避免堆砌统计数字，每个重要数字必须绑定对应证据；全部问题关闭后只需通过 complete_node 提交对用户的直接回答和总体限制，Harness 会从已记录 Finding 自动组装关键发现和编号引用，绝对不要重新抄写 Finding
    inputs:
      scope:
        $ref: "#/nodes/confirm_scope/output"
    completion:
      output_schema:
        type: object
        required: [direct_answer, limitations]
        properties:
          direct_answer:
            type: string
            minLength: 1
          limitations:
            type: array
            items:
              type: string
    capabilities:
      tools: [public_web_search, record_research_finding]
    limits:
      max_steps: 16
    transitions:
      completed: $complete
      failed: $fail
