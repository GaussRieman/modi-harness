id: deep_research
description: 选择该流程处理需要多维度、多次检索或综合判断的研究请求，例如全面分析、比较、尽调、竞争壁垒、技术实力、可信度或风险评估；研究目标或边界不足时也选择它，由流程先向用户确认范围。
input_schema:
  type: object
  required: [request]
  properties:
    request:
      type: string
      minLength: 1
    subject:
      type: string
    question:
      type: string
  additionalProperties: false
start_node: confirm_scope
nodes:
  - id: confirm_scope
    execution: autonomous
    goal: 理解深度研究请求并形成明确范围；如果主体、目标或判断维度不足，只向用户提出一个必要的简短问题，否则立即完成范围确认
    inputs:
      request:
        $ref: "#/workflow/input"
    completion:
      output_schema:
        type: object
        required: [subject, research_question]
        properties:
          subject:
            type: string
            minLength: 1
          research_question:
            type: string
            minLength: 1
          objectives:
            type: array
            items:
              type: string
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: investigate
      failed: $fail

  - id: investigate
    execution: autonomous
    goal: 围绕已确认的研究问题进行必要的多轮公开资料检索，覆盖关键维度并交叉核验；获得足够材料后汇总研究发现和引用，不向用户复述内部计划
    inputs:
      scope:
        $ref: "#/nodes/confirm_scope/output"
    completion:
      output_schema:
        type: object
        required: [research_summary, citations]
        properties:
          research_summary:
            type: string
            minLength: 1
          citations:
            type: array
            items:
              type: string
              pattern: "^https?://"
          limitations:
            type: array
            items:
              type: string
    capabilities:
      tools: [public_web_research]
    limits:
      max_steps: 10
    transitions:
      completed: synthesize
      failed: $fail

  - id: synthesize
    execution: autonomous
    goal: 将已确认范围和调查结果综合成直接、清晰、证据边界明确的最终研究回答，不再调用检索工具
    inputs:
      scope:
        $ref: "#/nodes/confirm_scope/output"
      investigation:
        $ref: "#/nodes/investigate/output"
    completion:
      output_schema:
        type: object
        required: [executive_summary, citations]
        properties:
          executive_summary:
            type: string
            minLength: 1
          citations:
            type: array
            items:
              type: string
              pattern: "^https?://"
          task_results:
            type: array
            items:
              type: object
          recommendations:
            type: array
            items:
              type: string
          limitations:
            type: array
            items:
              type: string
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: $complete
      failed: $fail
