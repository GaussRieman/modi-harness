id: quick_lookup
description: 选择该流程处理明确、狭窄的公开信息查询，包括只给出一个公司、人物、产品或概念名称并希望了解基本情况。一次公开检索通常足够。用户明确要求“仔细搜寻”、深入、全面、多方查证或尽调时，即使只有一个主体也不得选择该流程。不要用于比较、可信度、技术实力或风险评估，也不要用于天气、翻译、写代码等非研究任务。
input_schema:
  type: object
  required: [subject, question]
  properties:
    subject:
      type: string
      minLength: 1
    question:
      type: string
      minLength: 1
  additionalProperties: false
start_node: current_time
nodes:
  - id: current_time
    execution: operation
    operation: get_current_time
    transitions:
      completed: search
      failed: $fail

  - id: search
    execution: operation
    operation: public_web_research
    inputs:
      subject:
        $ref: "#/workflow/input/subject"
      question:
        $ref: "#/workflow/input/question"
      time_token:
        $ref: "#/nodes/current_time/output/time_token"
    transitions:
      completed: answer
      failed: $fail

  - id: answer
    execution: autonomous
    goal: 直接依据检索结果回答用户问题；结论简洁，引用只使用检索结果中的可用来源，不虚构事实。若 research_result.limitations 非空，必须将其中每条限制原样复制到输出 limitations，不得把具体 provider 名称、HTTP 状态码、超时或 DNS 错误概括成“搜索服务不可用”；不得把搜索未命中表述为主体不存在
    inputs:
      request:
        $ref: "#/workflow/input"
      research_result:
        $ref: "#/nodes/search/output"
    completion:
      output_schema:
        type: object
        required: [executive_summary, citations]
        properties:
          executive_summary:
            type: string
            minLength: 1
          citations:
            type: array
            items:
              type: string
              pattern: "^https?://"
          limitations:
            type: array
            items:
              type: string
    capabilities:
      tools: []
    limits:
      max_steps: 3
    transitions:
      completed: $complete
      failed: $fail
