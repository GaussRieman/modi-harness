id: research
input_schema:
  type: object
  properties:
    research_question:
      type: string
      minLength: 1
    prompt:
      type: string
      minLength: 1
    messages:
      type: array
      minItems: 1
  anyOf:
    - required: [research_question]
    - required: [prompt]
    - required: [messages]
start_node: research
nodes:
  - id: research
    execution: autonomous
    goal: 理解用户要研究的主体和问题，调用一次公共 Web 研究操作获取多来源记录，然后直接产出简洁、有引用且不夸大搜索结论的最终回答
    inputs:
      request:
        $ref: "#/workflow/input"
    completion:
      output_schema:
        type: object
        required:
          - research_question
          - executive_summary
          - task_results
          - recommendations
          - source_limitations
          - sources
          - search_records
        properties:
          research_question:
            type: string
            minLength: 1
          executive_summary:
            type: string
            minLength: 1
          task_results:
            type: array
            minItems: 1
            items:
              type: object
              required: [task, result, evidence, limitations]
              properties:
                task:
                  type: string
                  minLength: 1
                result:
                  type: string
                  minLength: 1
                evidence:
                  type: array
                  items:
                    type: string
                    pattern: "^https?://"
                limitations:
                  type: array
                  items:
                    type: string
                    minLength: 1
          recommendations:
            type: array
            items:
              type: string
          source_limitations:
            type: array
            items:
              type: string
              minLength: 1
          sources:
            type: array
            items:
              type: string
              pattern: "^https?://"
          search_records:
            type: array
            minItems: 1
            items:
              type: object
              required: [provider, query, search_url, status, results]
              properties:
                provider:
                  type: string
                  minLength: 1
                query:
                  type: string
                  minLength: 1
                search_url:
                  type: string
                  pattern: "^https?://"
                status:
                  type: string
                  enum: [ok, empty, blocked, failed]
                results:
                  type: array
      validator: validate_research_briefing
      require: [executive_summary, task_results, search_records]
    capabilities:
      tools: [public_web_research]
    limits:
      max_steps: 4
    transitions:
      completed: $complete
      failed: $fail
