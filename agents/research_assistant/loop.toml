max_auto_steps = 30
checkpoint = "after_durable_boundary"

[continuation_policy]
continue_after = [
  "task_protocol_operation_completed",
  "fetch_url_completed",
  "output_validation_repairable",
]
wait_on = [
  "missing_required_input",
  "source_url_replacement_needed",
  "hard_boundary_triggered",
]
finish_on = [
  "output_contract_validated",
]
