factory = "runtime:build_agent"

name = "research-assistant"
description = "Investigates research questions against provided URLs and produces a cited Chinese briefing."
skills = ["source-evaluation", "briefing-structure"]
instruction_file = "brain.md"

[permission_profile]
mode = "auto"
deny = ["save_memory"]

[interaction_protocol]
startup = "agent"

[task_protocol]
mode = "required"
review = "never"
min_items = 3
max_items = 4

[output_contract]
required_fields = [
  "research_question",
  "executive_summary",
  "task_results",
  "recommendations",
  "source_limitations",
]

[output_contract.schema]
type = "object"
required = [
  "research_question",
  "executive_summary",
  "task_results",
  "recommendations",
  "source_limitations",
]
additionalProperties = false

[output_contract.schema.properties.research_question]
type = "string"

[output_contract.schema.properties.executive_summary]
type = "string"

[output_contract.schema.properties.task_results]
type = "array"

[output_contract.schema.properties.task_results.items]
type = "object"
required = ["task", "result", "evidence", "limitations"]
additionalProperties = false

[output_contract.schema.properties.task_results.items.properties.task]
type = "string"

[output_contract.schema.properties.task_results.items.properties.result]
type = "string"

[output_contract.schema.properties.task_results.items.properties.evidence]
type = "array"
items = { type = "string" }

[output_contract.schema.properties.task_results.items.properties.limitations]
type = "array"
items = { type = "string" }

[output_contract.schema.properties.recommendations]
type = "array"
items = { type = "string" }

[output_contract.schema.properties.source_limitations]
type = "array"
items = { type = "string" }
